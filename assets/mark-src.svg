  <rect x="188" y="308" width="6" height="100" rx="3" fill="#07090D"/>
  <!-- Candle 2 -->
  <rect x="236" y="272" width="30" height="72" rx="4" fill="#07090D"/>
  <rect x="248" y="246" width="6" height="126" rx="3" fill="#07090D"/>
  <!-- Candle 3 -->
  <rect x="296" y="200" width="30" height="88" rx="4" fill="#07090D"/>
  <rect x="308" y="170" width="6" height="150" rx="3" fill="#07090D"/>

  <!-- Waterline -->
