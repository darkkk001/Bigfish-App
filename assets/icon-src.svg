<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7420"/>
      <stop offset="45%" stop-color="#E3B34C"/>
      <stop offset="100%" stop-color="#F5D98B"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10151F"/>
      <stop offset="100%" stop-color="#05070B"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E3B34C" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#E3B34C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background (iOS masks corners itself; full-bleed square) -->
  <rect width="1024" height="1024" fill="url(#ink)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Subtle grid texture (terminal feel) -->
  <g stroke="#1E2637" stroke-width="2" opacity="0.35">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- ── Mark, centered and scaled ── -->
  <g transform="translate(150,120) scale(1.45)">
    <path d="M 96 416 C 118 288, 196 152, 420 84 C 352 176, 330 268, 344 416 Z" fill="url(#gold)"/>
    <rect x="176" y="330" width="30" height="56" rx="4" fill="#05070B"/>
    <rect x="188" y="308" width="6" height="100" rx="3" fill="#05070B"/>
    <rect x="236" y="272" width="30" height="72" rx="4" fill="#05070B"/>
    <rect x="248" y="246" width="6" height="126" rx="3" fill="#05070B"/>
    <rect x="296" y="200" width="30" height="88" rx="4" fill="#05070B"/>
    <rect x="308" y="170" width="6" height="150" rx="3" fill="#05070B"/>
    <rect x="96" y="432" width="248" height="10" rx="5" fill="url(#gold)" opacity="0.55"/>
  </g>
</svg>
